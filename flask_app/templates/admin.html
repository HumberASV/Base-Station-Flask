<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Base Station</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; }
        header { background: #1a1d27; padding: 0.9rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3147; }
        header h1 { font-size: 1.1rem; color: #7eb8f7; }
        header a { color: #9ca3af; text-decoration: none; font-size: 0.85rem; }
        header a:hover { color: #e0e0e0; }
        main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #1a1d27; border: 1px solid #2d3147; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
        .card h2 { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.25rem; }
        .form-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.78rem; color: #9ca3af; margin-bottom: 0.3rem; }
        input[type="text"], input[type="number"] { background: #0f1117; border: 1px solid #2d3147; color: #e0e0e0; padding: 0.55rem 0.75rem; border-radius: 4px; font-size: 0.9rem; }
        input[type="text"]:focus, input[type="number"]:focus { outline: 2px solid #7eb8f7; border-color: #7eb8f7; }
        #label { width: 220px; }
        #days  { width: 100px; }
        button { padding: 0.55rem 1.1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: #fff; font-size: 0.8rem; padding: 0.35rem 0.75rem; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-warning { background: #d97706; color: #fff; font-size: 0.8rem; padding: 0.35rem 0.75rem; }
        .btn-warning:hover { background: #b45309; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th { text-align: left; padding: 0.6rem 0.5rem; color: #6b7280; font-weight: 500; border-bottom: 1px solid #2d3147; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 0.7rem 0.5rem; border-bottom: 1px solid #1a1d27; vertical-align: middle; }
        tr:hover td { background: #1e2235; }
        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 3px; font-size: 0.72rem; font-weight: 600; }
        .badge-active  { background: #14532d; color: #4ade80; }
        .badge-expired { background: #450a0a; color: #f87171; }
        .action-cell { display: flex; gap: 0.4rem; }
        /* Modal */
        .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 50; align-items: center; justify-content: center; }
        .backdrop.open { display: flex; }
        .modal { background: #1a1d27; border: 1px solid #2d3147; border-radius: 8px; padding: 2rem; max-width: 480px; width: 90%; }
        .modal h3 { color: #4ade80; margin-bottom: 0.5rem; }
        .modal p { color: #9ca3af; font-size: 0.83rem; margin-bottom: 1rem; }
        .token-box { background: #0f1117; border: 1px solid #2d3147; border-radius: 4px; padding: 0.75rem; font-family: monospace; font-size: 0.85rem; word-break: break-all; color: #7eb8f7; margin-bottom: 1.25rem; }
        .modal-actions { display: flex; gap: 0.75rem; }
        .empty-cell { color: #6b7280; text-align: center; padding: 2.5rem 0; }
    </style>
</head>
<body>
<header>
    <h1>Base Station Admin</h1>
    <a href="/admin/logout">Log out</a>
</header>

<main>
    <div class="card">
        <h2>Create Access Token</h2>
        <div class="form-row">
            <div class="field">
                <label for="label">Label</label>
                <input type="text" id="label" placeholder="e.g. Judge seat 1">
            </div>
            <div class="field">
                <label for="days">Expires in (days)</label>
                <input type="number" id="days" value="1" min="1" max="365">
            </div>
            <button type="button" class="btn-primary" onclick="createToken()">Create Token</button>
        </div>
    </div>

    <div class="card">
        <h2>Access Tokens</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Label</th>
                    <th>Created by</th>
                    <th>Expires</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="token-tbody">
                <tr><td class="empty-cell" colspan="6">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</main>

<!-- New-token modal -->
<div class="backdrop" id="modal">
    <div class="modal">
        <h3>Token Created</h3>
        <p>Copy this token and share it with the user. It will not be shown again.</p>
        <div class="token-box" id="modal-token"></div>
        <div class="modal-actions">
            <button type="button" class="btn-primary" onclick="copyToken()">Copy to clipboard</button>
            <button type="button" onclick="closeModal()">Done</button>
        </div>
    </div>
</div>

<script>
async function loadTokens() {
    const resp = await fetch('/admin/tokens');
    const list = await resp.json();
    const tbody = document.getElementById('token-tbody');
    if (!list.length) {
        tbody.innerHTML = '<tr><td class="empty-cell" colspan="6">No tokens yet.</td></tr>';
        return;
    }
    tbody.innerHTML = list.map(t => {
        const expires = new Date(t.expires_at).toLocaleString();
        const badge = t.active
            ? '<span class="badge badge-active">Active</span>'
            : '<span class="badge badge-expired">Expired</span>';
        return `<tr>
            <td>${t.id}</td>
            <td>${esc(t.label)}</td>
            <td>${esc(t.created_by)}</td>
            <td>${expires}</td>
            <td>${badge}</td>
            <td>
                <div class="action-cell">
                    <button class="btn-warning" onclick="expireToken(${t.id})" ${!t.active ? 'disabled' : ''}>Expire</button>
                    <button class="btn-danger"  onclick="revokeToken(${t.id})">Revoke</button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function createToken() {
    const label = document.getElementById('label').value.trim();
    const days  = parseInt(document.getElementById('days').value) || 1;
    const body  = new URLSearchParams({ label, days });
    const resp  = await fetch('/admin/create_token', { method: 'POST', body });
    if (!resp.ok) { alert('Failed to create token.'); return; }
    const data = await resp.json();
    document.getElementById('modal-token').textContent = data.token;
    document.getElementById('modal').classList.add('open');
    document.getElementById('label').value = '';
    loadTokens();
}

async function revokeToken(id) {
    if (!confirm('Permanently delete this token? Users holding it will lose access immediately.')) return;
    await fetch('/admin/revoke_token', { method: 'POST', body: new URLSearchParams({ token_id: id }) });
    loadTokens();
}

async function expireToken(id) {
    if (!confirm('Expire this token now? It will stop working immediately.')) return;
    await fetch('/admin/expire_token', { method: 'POST', body: new URLSearchParams({ token_id: id }) });
    loadTokens();
}

function copyToken() {
    navigator.clipboard.writeText(document.getElementById('modal-token').textContent)
        .then(() => alert('Copied to clipboard.'));
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
}

loadTokens();
</script>
</body>
</html>
