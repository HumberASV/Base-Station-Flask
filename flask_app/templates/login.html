<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Base Station</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1a1d27; border: 1px solid #2d3147; border-radius: 8px; padding: 2rem; width: 340px; }
        h1 { font-size: 1.2rem; color: #7eb8f7; margin-bottom: 1.5rem; }
        label { font-size: 0.8rem; color: #9ca3af; display: block; margin-bottom: 0.3rem; }
        input { width: 100%; background: #0f1117; border: 1px solid #2d3147; color: #e0e0e0; padding: 0.6rem 0.75rem; border-radius: 4px; font-size: 0.9rem; margin-bottom: 1rem; }
        input:focus { outline: 2px solid #7eb8f7; border-color: #7eb8f7; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 0.65rem; border-radius: 4px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .error { color: #f87171; font-size: 0.85rem; margin-bottom: 1rem; background: #450a0a; padding: 0.5rem 0.75rem; border-radius: 4px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Base Station Admin</h1>
    {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
            {% for msg in messages %}
                <div class="error">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Log in</button>
    </form>
</div>
</body>
</html>
